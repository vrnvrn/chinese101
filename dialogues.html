<html lang="en">
<head>

        .hero-title { font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 700; line-height: 1.1; margin-bottom: 0.75rem; }

        .topic-btn.active { background: white; color: #1a1a1a; }

        /* Topic sections */
        .topic-section { display: none; }

        .topic-sub { font-size: 0.95rem; color: rgba(255,255,255,0.5); margin-top: 0.5rem; }

        .section-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #888; margin-bottom: 0.5rem; }
        .section-heading { font-size: clamp(1.4rem, 2.5vw, 1.9rem); font-weight: 700; color: #1a1a1a; margin-bottom: 1rem; }

        /* Flashcards */
        .flashcard-wrap { perspective: 800px; height: 210px; cursor: pointer; margin-bottom: 1rem; }
        .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.45s; }
        .flashcard-wrap.flipped .flashcard { transform: rotateY(180deg); }
        .fc-front, .fc-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; text-align: center; }

        .fc-back { background: #eef4fb; color: #1a1a1a; transform: rotateY(180deg); }
        .fc-zh { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', serif; font-size: 3.2rem; line-height: 1.1; }
        .fc-hint { font-size: 0.72rem; opacity: 0.35; margin-top: 0.75rem; }
        .fc-py { font-size: 1.35rem; font-style: italic; color: #555; margin-bottom: 0.2rem; }
        .fc-en { font-size: 1.1rem; font-weight: 600; color: #1a1a1a; }

        .fc-counter { font-size: 0.85rem; color: #888; min-width: 4rem; text-align: center; }

        .td-zh { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', serif; font-size: 1.35rem; }
        .td-py { color: #666; font-style: italic; }
        .td-en { color: #333; }

        /* Buttons */
        .btn { background: #1a1a1a; color: white; border: none; padding: 0.65rem 1.4rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.75; }
        .btn-outline { background: transparent; color: #1a1a1a; border: 2px solid #1a1a1a; }
        .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.8rem; }

        .dl-display { background: #f8f8f8; border-radius: 16px; padding: 2rem; margin: 1.5rem 0 1rem; min-height: 170px; display: flex; flex-direction: column; justify-content: center; }
        .dl-speaker-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
        .dl-counter-label { font-size: 0.75rem; color: #aaa; font-weight: 600; letter-spacing: 0.05em; }
        .dl-zh-big { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', serif; font-size: 1.8rem; line-height: 1.35; color: #1a1a1a; margin-bottom: 0.4rem; }
        .dl-py-line { font-size: 1rem; color: #888; font-style: italic; margin-bottom: 0.3rem; visibility: hidden; }
        .dl-en-line { font-size: 1rem; color: #aaa; visibility: hidden; }
        .dl-py-line.show, .dl-en-line.show { visibility: visible; }
        .dl-controls { display: flex; gap: 0.6rem; align-items: center; }
        .d-speaker { width: 1.8rem; height: 1.8rem; border-radius: 50%; background: #1a1a1a; color: white; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; flex-shrink: 0; margin-top: 0.25rem; }
        .d-speaker.sp-b { background: #555; }

        /* Full script */
        .full-script-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
        .script-toggle-group { display: flex; gap: 0.4rem; }
        .full-script { background: white; border-radius: 12px; padding: 1.5rem; }
        .d-line { display: flex; gap: 0.9rem; align-items: flex-start; padding: 0.55rem 0; border-bottom: 1px solid #eee; }
        .d-line:last-child { border-bottom: none; }
        .d-zh { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', serif; font-size: 1.2rem; line-height: 1.4; }
        .d-py { font-size: 0.85rem; color: #888; font-style: italic; display: none; margin-top: 0.1rem; }
        .d-en { font-size: 0.85rem; color: #bbb; display: none; }
        .show-py .d-py { display: block; }
        .show-en .d-en { display: block; }

        /* Footer */
        .page-footer { text-align: center; padding: 2rem 1rem; font-size: 0.78rem; background: rgba(26,26,26,0.85); color: rgba(255,255,255,0.35); }

        @media (max-width: 640px) {
            .content-wrap { padding: 2rem 1rem 3rem; }
        }
    </style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────────

let activeTopic = 0;

const state = topics.map(() => ({
    fcIdx: 0,
    dl: { idx: 0, showPy: false, showEn: false },
}));

// ── RENDER ───────────────────────────────────────────────────────────────

function buildTopicBar() {
    const bar = document.getElementById('topic-bar');
    bar.innerHTML = topics.map((t, i) =>
        `<button class="topic-btn${i === 0 ? ' active' : ''}" onclick="selectTopic(${i})">${t.tab}</button>`
    ).join('');
}

function selectTopic(i) {
    activeTopic = i;
    document.querySelectorAll('.topic-btn').forEach((b, j) => b.classList.toggle('active', j === i));
    document.querySelectorAll('.topic-section').forEach((s, j) => s.classList.toggle('active', j === i));
    document.getElementById('topic-sections').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

                            <div>
                                <div class="d-zh cjk">${l.zh}</div>
                                <div class="d-py">${l.py}</div>
                                <div class="d-en">${l.en}</div>
                            </div>
                        </div>`).join('')}
                    </div>
                </div>

            </div>
        </div>`;
    }).join('');
}

// ── FLASHCARD LOGIC ───────────────────────────────────────────────────────

function fcFlip(ti) { document.getElementById(`fc-wrap-${ti}`).classList.toggle('flipped'); }

function fcShow(ti) {
    document.getElementById(`fc-wrap-${ti}`).classList.remove('flipped');
    const s = state[ti];
    setTimeout(() => {
        const c = topics[ti].vocab[s.fcIdx];
        document.getElementById(`fc-zh-${ti}`).textContent = c.zh;
        document.getElementById(`fc-py-${ti}`).textContent = c.py;
        document.getElementById(`fc-en-${ti}`).textContent = c.en;
        document.getElementById(`fc-counter-${ti}`).textContent = (s.fcIdx+1) + ' / ' + topics[ti].vocab.length;
    }, 240);
}

function fcNext(ti) { state[ti].fcIdx = (state[ti].fcIdx + 1) % topics[ti].vocab.length; fcShow(ti); }
function fcPrev(ti) { state[ti].fcIdx = (state[ti].fcIdx - 1 + topics[ti].vocab.length) % topics[ti].vocab.length; fcShow(ti); }

// ── DIALOGUE LOGIC ────────────────────────────────────────────────────────

function dlRender(ti) {
    const s = state[ti].dl;
    const lines = topics[ti].dialogue.lines;
    const l = lines[s.idx];
    const id = `dl-${ti}`;
    const spEl = document.getElementById(`${id}-sp`);
    spEl.textContent = l.sp;
    spEl.className = 'd-speaker' + (l.sp === 'B' ? ' sp-b' : '');
    document.getElementById(`${id}-zh`).textContent = l.zh;
    document.getElementById(`${id}-py`).textContent = l.py;
    document.getElementById(`${id}-en`).textContent = l.en;
    document.getElementById(`${id}-py`).classList.toggle('show', s.showPy);
    document.getElementById(`${id}-en`).classList.toggle('show', s.showEn);
    document.getElementById(`${id}-py-btn`).classList.toggle('btn-outline', !s.showPy);
    document.getElementById(`${id}-en-btn`).classList.toggle('btn-outline', !s.showEn);
    document.getElementById(`${id}-counter`).textContent = 'Line ' + (s.idx+1) + ' / ' + lines.length;
}

function dlToggle(ti, which) {
    const s = state[ti].dl;
    if (which === 'py') s.showPy = !s.showPy;
    else s.showEn = !s.showEn;
    dlRender(ti);
}

function dlNext(ti) {
    const s = state[ti].dl;
    s.idx = (s.idx + 1) % topics[ti].dialogue.lines.length;
    s.showPy = false; s.showEn = false;
    dlRender(ti);
}

function dlPrev(ti) {
    const s = state[ti].dl;
    const n = topics[ti].dialogue.lines.length;
    s.idx = (s.idx - 1 + n) % n;
    s.showPy = false; s.showEn = false;
    dlRender(ti);
}

// ── FULL SCRIPT TOGGLE ────────────────────────────────────────────────────

function scriptToggle(ti, which) {
    const sid = `sc-${ti}`;
    const active = document.getElementById(sid).classList.toggle('show-' + which);
    document.getElementById(`${sid}-${which}-btn`).classList.toggle('btn-outline', !active);
}

// ── PROGRESS BAR ──────────────────────────────────────────────────────────

window.addEventListener('scroll', () => {
    const pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100;
    document.getElementById('progress-bar').style.width = (pct || 0) + '%';
});

// ── INIT ──────────────────────────────────────────────────────────────────

buildTopicBar();
buildAllSections();
</script>
