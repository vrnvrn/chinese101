<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK 1 Flashcards · 300 words</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f5;
        color: #2d3748;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }
    .han { font-family: 'Noto Serif SC', 'PingFang SC', 'Songti SC', serif; }

    .topbar {
        background: rgba(26,26,26,0.96);
        backdrop-filter: blur(8px);
        color: white;
        padding: 0.75rem 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.85rem;
    }
    .topbar a {
        color: rgba(255,255,255,0.75);
        text-decoration: none;
        padding: 0.3rem 0.65rem;
        border-radius: 6px;
        transition: background 0.15s, color 0.15s;
    }
    .topbar a:hover { background: rgba(255,255,255,0.12); color: white; }
    .topbar .title {
        font-weight: 600;
        color: white;
        margin-left: 0.25rem;
    }
    .topbar .badge {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: #f59e0b;
        color: #1a1a1a;
        padding: 0.18rem 0.5rem;
        border-radius: 4px;
        margin-left: 0.25rem;
    }
    .topbar .spacer { flex: 1; }

    main {
        flex: 1;
        padding: 2rem 1.5rem 3rem;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .wrap { max-width: 640px; width: 100%; }

    .header-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 1.25rem;
        flex-wrap: wrap;
        gap: 0.5rem;
    }
    .header-row h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1a1a1a;
    }
    .header-row .count {
        font-size: 0.85rem;
        color: #888;
        font-weight: 600;
    }

    .toggles {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        margin-bottom: 1.25rem;
        flex-wrap: wrap;
    }
    .gt-label {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #666;
        margin-right: 0.15rem;
    }
    .toggle-btn {
        background: white;
        border: 1.5px solid #d1d5db;
        color: #444;
        font-size: 0.78rem;
        font-weight: 600;
        padding: 0.42rem 0.85rem;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 0.03em;
    }
    .toggle-btn:hover { border-color: #1a1a1a; }
    .toggle-btn.active {
        background: #1a1a1a;
        color: white;
        border-color: #1a1a1a;
    }
    .toggle-btn .dot {
        display: inline-block;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #cbd5e0;
        margin-right: 0.45rem;
        vertical-align: middle;
    }
    .toggle-btn.active .dot { background: #4ade80; }

    .progress {
        font-size: 0.8rem;
        font-weight: 600;
        color: #555;
        margin-left: 0.25rem;
    }
    .progress-bar {
        width: 100%;
        height: 4px;
        background: #e5e7eb;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 1rem;
    }
    .progress-fill {
        height: 100%;
        background: #1a1a1a;
        transition: width 0.2s;
    }

    .flash-stage { perspective: 1200px; margin-bottom: 1rem; }
    .flashcard {
        position: relative;
        width: 100%;
        min-height: 360px;
        cursor: pointer;
        transform-style: preserve-3d;
        transition: transform 0.45s;
    }
    .flashcard.flipped { transform: rotateY(180deg); }
    .fc-face {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        border-radius: 16px;
        background: white;
        border: 1.5px solid #e5e7eb;
        padding: 2rem 1.5rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }
    .fc-pos {
        position: absolute;
        top: 1rem;
        right: 1.25rem;
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #94a3b8;
    }
    .fc-front .fc-hanzi {
        font-size: clamp(4rem, 11vw, 6rem);
        font-weight: 600;
        color: #1a1a1a;
        line-height: 1;
        margin-bottom: 1rem;
    }
    .fc-front .fc-hint {
        font-size: 0.75rem;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-top: 1.5rem;
    }
    .fc-back { transform: rotateY(180deg); }
    .fc-back .fc-pinyin {
        font-size: 1.6rem;
        font-weight: 600;
        color: #1a1a1a;
        margin-bottom: 0.5rem;
    }
    .fc-back .fc-en {
        font-size: 1.15rem;
        color: #475569;
        margin-bottom: 1.5rem;
    }
    .fc-back .fc-ex-han { font-size: 1.3rem; color: #1a1a1a; margin-bottom: 0.3rem; }
    .fc-back .fc-ex-py { font-size: 0.85rem; color: #64748b; margin-bottom: 0.15rem; }
    .fc-back .fc-ex-en { font-size: 0.85rem; color: #64748b; }

    body.hide-pinyin .fc-back .fc-pinyin,
    body.hide-pinyin .fc-back .fc-ex-py { display: none; }
    body.hide-english .fc-back .fc-en,
    body.hide-english .fc-back .fc-ex-en { display: none; }

    .controls {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.75rem;
    }
    .ctrl-btn {
        flex: 1 0 auto;
        background: white;
        border: 1.5px solid #d1d5db;
        color: #1a1a1a;
        font-size: 0.85rem;
        font-weight: 600;
        padding: 0.7rem 1rem;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.15s;
    }
    .ctrl-btn:hover:not(:disabled) { border-color: #1a1a1a; background: #1a1a1a; color: white; }
    .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .ctrl-btn.primary {
        background: #1a1a1a;
        color: white;
        border-color: #1a1a1a;
    }
    .ctrl-btn.primary:hover:not(:disabled) {
        background: #2d2d2d;
    }

    .footer-note {
        text-align: center;
        font-size: 0.75rem;
        color: #888;
        margin-top: 1.5rem;
    }
    .footer-note kbd {
        font-family: ui-monospace, monospace;
        background: #e5e7eb;
        border-radius: 4px;
        padding: 1px 6px;
        font-size: 0.7rem;
    }
</style>
</head>
<body>

<div class="topbar">
    <a href="/">← Chinese 101</a>
    <span class="title">HSK 1 Flashcards</span>
    <span class="badge">Temp</span>
    <div class="spacer"></div>
    <a href="/textbook">Full Textbook</a>
</div>

<main>
    <div class="wrap">
        <div class="header-row">
            <h1>All 300 HSK 1 words</h1>
            <span class="count" id="count">300 words</span>
        </div>

        <div class="toggles">
            <span class="gt-label">Show</span>
            <button class="toggle-btn active" id="toggle-pinyin"><span class="dot"></span>Pinyin</button>
            <button class="toggle-btn active" id="toggle-english"><span class="dot"></span>English</button>
            <span class="progress" id="progress">1 / 300</span>
        </div>

        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="flash-stage">
            <div class="flashcard" id="flashcard">
                <div class="fc-face fc-front">
                    <span class="fc-pos" id="fc-front-pos"></span>
                    <div class="fc-hanzi han" id="fc-front-han"></div>
                    <div class="fc-hint">tap or press space to reveal</div>
                </div>
                <div class="fc-face fc-back">
                    <span class="fc-pos" id="fc-back-pos"></span>
                    <div class="fc-pinyin" id="fc-back-py"></div>
                    <div class="fc-en" id="fc-back-en"></div>
                    <div class="fc-ex-han han" id="fc-back-ex-han"></div>
                    <div class="fc-ex-py" id="fc-back-ex-py"></div>
                    <div class="fc-ex-en" id="fc-back-ex-en"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="prev">← Prev</button>
            <button class="ctrl-btn primary" id="next">Next →</button>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="shuffle">Shuffle</button>
            <button class="ctrl-btn" id="reset">Reset</button>
            <button class="ctrl-btn" id="jump-end">Jump to end</button>
        </div>

        <div class="footer-note">
            <kbd>Space</kbd> flip · <kbd>←</kbd> prev · <kbd>→</kbd> next · 300 words from the HSK 1 词汇大纲
        </div>
    </div>
</main>

let order = WORDS.map((_, i) => i);
let idx = 0;

const $ = (id) => document.getElementById(id);

function current() { return WORDS[order[idx]]; }

function render() {
    const w = current();
    const card = $('flashcard');
    card.classList.remove('flipped');
    $('fc-front-pos').textContent = w[2];
    $('fc-back-pos').textContent = w[2];
    $('fc-front-han').textContent = w[0];
    $('fc-back-py').textContent = w[1];
    $('fc-back-en').textContent = w[3];
    $('fc-back-ex-han').textContent = w[4];
    $('fc-back-ex-py').textContent = w[5];
    $('fc-back-ex-en').textContent = w[6];
    $('progress').textContent = `${idx + 1} / ${WORDS.length}`;
    $('progress-fill').style.width = `${((idx + 1) / WORDS.length) * 100}%`;
    $('prev').disabled = idx === 0;
    $('next').disabled = idx === WORDS.length - 1;
}

function setupCard() {
    const card = $('flashcard');
    card.addEventListener('click', () => card.classList.toggle('flipped'));
}

function setupNav() {
    $('prev').addEventListener('click', () => { if (idx > 0) { idx--; render(); } });
    $('next').addEventListener('click', () => { if (idx < WORDS.length - 1) { idx++; render(); } });
    $('jump-end').addEventListener('click', () => { idx = WORDS.length - 1; render(); });
    $('shuffle').addEventListener('click', () => {
        for (let i = order.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [order[i], order[j]] = [order[j], order[i]];
        }
        idx = 0;
        render();
    });
    $('reset').addEventListener('click', () => {
        order = WORDS.map((_, i) => i);
        idx = 0;
        render();
    });
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowLeft' && idx > 0) { idx--; render(); }
        else if (e.key === 'ArrowRight' && idx < WORDS.length - 1) { idx++; render(); }
        else if (e.key === ' ' || e.key === 'Enter') {
            if (document.activeElement && document.activeElement.tagName === 'BUTTON') return;
            e.preventDefault();
            $('flashcard').classList.toggle('flipped');
        }
    });
}

function setupToggles() {
    const py = $('toggle-pinyin');
    const en = $('toggle-english');
    py.addEventListener('click', () => {
        const willHide = !document.body.classList.contains('hide-pinyin');
        document.body.classList.toggle('hide-pinyin', willHide);
        py.classList.toggle('active', !willHide);
    });
    en.addEventListener('click', () => {
        const willHide = !document.body.classList.contains('hide-english');
        document.body.classList.toggle('hide-english', willHide);
        en.classList.toggle('active', !willHide);
    });
}

$('count').textContent = `${WORDS.length} words`;
render();
setupCard();
setupNav();
setupToggles();
</script>
